<style>

/* ==============================
   1. VARIABLES Y BASE 
   ============================== */
:root {
  --bg-dark: #0f0f1a;
  --bg-card: #1a1a2e;
  --bg-card-hover: #1d1d33;
  --accent: #8b5cf6;
  --accent-light: #c4b5fd;
  --border: #2a2a40;
  --text-primary: #ffffff;
  --text-secondary: #a1a1aa;
}

body {
  background: var(--bg-dark);
  color: var(--text-primary);
  font-family: system-ui, -apple-system, sans-serif;
  overflow-x: hidden;
}

/* ==============================
   2. UTILITIES 
   ============================== */
section {
  padding: 5rem 0; /* Más aire entre secciones */
}

h2 {
  font-weight: 700;
  margin-bottom: 3rem;
  position: relative;
  display: inline-block;
}

h2::after {
  content: "";
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 50%;
  height: 3px;
  background: var(--accent);
  border-radius: 2px;
}

/* ==============================
   3. NAV 
   ============================== */
nav {
  background: rgba(15, 15, 26, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  z-index: 1000;
}

.navbar-brand {
  font-weight: 700;
  letter-spacing: -0.5px;
}

/* ==============================
   4. TITULO Y TYPING
   ============================== */
.main-title {
  font-size: 3.8rem;
  font-weight: 800;
  background: linear-gradient(90deg, var(--accent-light), var(--accent), var(--accent-light));
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 4s linear infinite;
  margin-bottom: 0.5rem;
}

@keyframes shine {
  to { background-position: 200% center; }
}

.typing-container {
  font-size: 1.5rem;
  color: var(--text-secondary);
  font-weight: 400;
  margin-bottom: 2.5rem;
}

.typed-text {
  color: var(--accent);
  font-weight: 600;
}

.cursor {
  display: inline-block;
  width: 3px;
  background-color: var(--accent);
  animation: blink 0.8s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ==============================
   5. HERO Y ICONOS 
   ============================== */
.hero {
  padding: 9rem 0 5rem;
  position: relative;
}

.hero-icons a {
  color: var(--text-secondary);
  font-size: 2rem;
  margin: 0 1rem;
  transition: all 0.4s ease;
  display: inline-block;
}

.hero-icons a:hover {
  color: var(--accent);
  transform: translateY(-5px) scale(1.1);
  text-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
}

/* ==============================
   6. STACK (CATEGORIZADO)
   ============================== */
.stack-category {
  background: rgba(26, 26, 46, 0.5);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2rem;
  margin-bottom: 2rem;
}

.stack-category h5 {
  color: var(--accent-light);
  margin-bottom: 1.5rem;
  font-size: 1.1rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
}

.stack img {
  width: 60px;
  margin: 12px;
  padding: 12px;
  background: radial-gradient(circle, #20203a, #0f0f1a);
  border-radius: 16px;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  filter: brightness(0.9) saturate(0.8);
}

.stack img:hover {
  transform: scale(1.25) translateY(-8px);
  box-shadow: 0 12px 30px rgba(139, 92, 246, 0.6);
  filter: brightness(1.1) saturate(1.2);
}

/* ==============================
   7. TIMELINE 
   ============================== */
.timeline {
  border-left: 2px solid var(--border);
  padding-left: 35px;
  position: relative;
}

.timeline-item {
  margin-bottom: 3rem;
  position: relative;
}

.dot {
  width: 18px;
  height: 18px;
  background: var(--accent);
  border-radius: 50%;
  position: absolute;
  left: -44px;
  top: 6px;
  box-shadow: 0 0 12px rgba(139, 92, 246, 0.8);
  transition: 0.3s;
}

.timeline-item:hover .dot {
  transform: scale(1.4);
  background: var(--accent-light);
}

.timeline-item h5 {
  color: var(--accent-light);
  font-weight: 700;
  font-size: 1.2rem;
}

.timeline-item p {
  color: var(--text-secondary);
  font-size: 1rem;
}

/* ==============================
   8. PROYECTOS (EXPLOTADO)
   ============================== */
.project {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 3rem;
  margin-bottom: 3rem;
  transition: all 0.5s ease;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Efecto de borde brillante superior */
.project::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  transform: translateX(-100%);
  transition: 0.8s;
}

.project:hover {
  transform: translateY(-10px);
  background: var(--bg-card-hover);
  box-shadow: 0 25px 50px rgba(139, 92, 246, 0.25);
  border-color: rgba(139, 92, 246, 0.4);
}

.project:hover::before {
  transform: translateX(100%);
}

.project h3 {
  font-weight: 800;
  color: var(--accent-light);
  font-size: 1.8rem;
  margin-bottom: 1.5rem;
}

/* TECH BADGES */
.tech {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 1.5rem;
}

.tech-badge {
  background: rgba(139, 92, 246, 0.12);
  color: var(--accent-light);
  border: 1px solid rgba(139, 92, 246, 0.35);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  transition: 0.3s;
  font-weight: 500;
}

.tech-badge:hover {
  background: rgba(139, 92, 246, 0.25);
  transform: scale(1.08);
}

.tech-badge img {
  width: 19px;
  margin-right: 7px;
}

/* BUTTONS */
.btn-modern {
  background: transparent;
  border: 2px solid var(--accent);
  color: var(--text-primary);
  border-radius: 30px;
  padding: 0.7rem 1.8rem;
  font-weight: 600;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 9px;
  transition: 0.4s;
  cursor: pointer;
}

.btn-modern:hover {
  background: var(--accent);
  color: white;
  box-shadow: 0 8px 20px rgba(139, 92, 246, 0.45);
}

/* ==============================
   9. CV FLOTANTE (NUEVO)
   ============================== */
.cv-float {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: var(--accent);
  color: white;
  border-radius: 50px;
  padding: 12px 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  z-index: 2000;
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  font-weight: 700;
  transition: all 0.4s ease;
  border: 2px solid transparent;
}

.cv-float:hover {
  transform: scale(1.05) translateY(-5px);
  background: #7c3aed; /* Un violeta un toque más oscuro */
  box-shadow: 0 15px 40px rgba(139, 92, 246, 0.5);
  border-color: var(--accent-light);
  color: white;
}

/* ==============================
   10. FOOTER 
   ============================== */
footer {
  background: var(--bg-dark);
  border-top: 1px solid var(--border);
  padding: 5rem 2.5rem 3rem;
  text-align: center;
}

footer .footer-text {
  color: var(--text-secondary);
  font-size: 1.2rem;
  margin-bottom: 2rem;
  font-weight: 500;
}

footer a {
  color: var(--text-secondary);
  font-size: 1.8rem;
  margin: 0 1rem;
  transition: 0.3s;
  display: inline-block;
}

footer a:hover {
  color: var(--accent);
  transform: translateY(-4px);
  text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
}

.copy {
  margin-top: 2.5rem;
  font-size: 0.95rem;
  color: var(--text-secondary);
  opacity: 0.6;
}

/* ==============================
   11. ANIMACION FADE-UP 
   ============================== */
.fade-up {
  opacity: 0;
  transform: translateY(35px);
  transition: all 0.9s ease-out;
}

.fade-up.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>
