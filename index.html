<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ignacio Egozcue | Portfolio Backend</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

  <style>
    :root {
      --bg-dark: #0d0d0e;
      --card-bg: #161617;
      --accent: #c586c0;
      --text-blue: #4fc1ff;
      --border-color: #2d2d2d;
    }

    body {
      background-color: var(--bg-dark);
      color: #e0e0e0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .accent { color: var(--accent); }
    .text-blue { color: var(--text-blue); }

    nav {
      background-color: rgba(13, 13, 14, 0.9) !important;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
    }

    .hero { padding: 8rem 0 4rem; }
    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      background: linear-gradient(90deg, #ffffff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    .hero-icons { display: flex; gap: 25px; margin-top: 2rem; }
    .hero-icons a {
      color: #ffffff;
      font-size: 2.5rem;
      transition: 0.3s ease;
    }
    .hero-icons a:hover { color: var(--accent); transform: translateY(-5px); }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 20px;
      margin-top: 2rem;
    }

    .skill-item {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 15px;
      padding: 1.5rem 0.5rem;
      text-align: center;
      transition: 0.3s;
    }

    .skill-item:hover {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(197, 134, 192, 0.2);
    }

    .timeline {
      border-left: 2px solid var(--accent);
      padding-left: 20px;
    }

    .timeline-item {
      position: relative;
      margin-bottom: 2.5rem;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: -31px;
      top: 5px;
      width: 20px;
      height: 20px;
      background: var(--bg-dark);
      border: 3px solid var(--accent);
      border-radius: 50%;
    }

    .project-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 2.5rem;
      margin-bottom: 3rem;
    }

    .btn-custom {
      border: 1px solid var(--border-color);
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      color: white;
      text-decoration: none;
    }

    .aprendi-box {
      background: #0a0a0a;
      border-radius: 15px;
      padding: 20px;
      border-left: 4px solid var(--accent);
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark fixed-top">
  <div class="container">
    <span class="navbar-brand fw-bold">IE<span class="accent">.dev</span></span>
  </div>
</nav>

<header class="container hero">
  <h1>Ignacio Egozcue</h1>
  <p>Desarrollador Backend en formación</p>
</header>

<main class="container">

<section>
  <h2>Trayectoria Académica</h2>
  <div class="timeline">
    <div class="timeline-item">
      <h5>Actualidad</h5>
      <p>Cursando: Algoritmos 1 e Ingeniería de Software</p>
    </div>
  </div>
</section>

<!-- VIDEO -->
<section class="my-5">
  <iframe width="100%" height="400"
    src="https://www.youtube.com/embed/0E5piiMhuZM"
    frameborder="0" allowfullscreen>
  </iframe>
</section>

<!-- PROYECTO -->
<section>
  <div class="project-card">
    <h3>Agencia de Envíos</h3>
    <img src="img/enviosListadoAdmin.png" class="img-fluid">
  </div>
</section>

</main>

</body>
</html>
