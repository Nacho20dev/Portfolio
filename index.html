<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignacio Egozcue | Portfolio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #020205;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- BACKGROUND FIXED --- */
        .hero-wrapper {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.1) 0%, transparent 40%), var(--bg-dark);
            background-attachment: fixed;
            padding: 120px 0 80px;
        }

        .stars-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png');
            opacity: 0.3; z-index: 1;
        }

        .hero-content { position: relative; z-index: 10; text-align: center; }
        .main-title { font-size: clamp(3rem, 10vw, 6.5rem); font-weight: 900; background: linear-gradient(180deg, #fff 0%, #a78bfa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- ORBITAL STACK SYSTEM --- */
        .orbit-section {
            padding: 100px 0;
            perspective: 1000px;
            overflow: hidden;
        }

        .orbit-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            transform-style: preserve-3d;
            cursor: grab;
            user-select: none;
        }

        .orbit-container:active { cursor: grabbing; }

        .orbit-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 50px var(--accent-glow);
            z-index: 10;
        }

        .orbit-center i { font-size: 2rem; color: white; }

        .orbit-item {
            position: absolute;
            top: 50%; left: 50%;
            width: 60px; height: 60px;
            margin-top: -30px; margin-left: -30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s ease-out;
            pointer-events: none; /* Evita que el icono bloquee el arrastre */
        }

        .orbit-item img { width: 35px; height: 35px; }

        /* --- BOTONES --- */
        .btn-hero {
            background: linear-gradient(45deg, var(--accent), #6366f1);
            color: white; padding: 16px 40px; border-radius: 50px; font-weight: 700;
            text-decoration: none; display: inline-block; transition: 0.4s;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2);
        }
        .btn-hero:hover { transform: translateY(-5px); box-shadow: 0 15px 30px var(--accent-glow); color: white; }

        .btn-custom {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--accent);
            color: white; padding: 12px 24px; border-radius: 14px; text-decoration: none;
            transition: 0.3s; font-weight: 600;
        }
        .btn-custom:hover { background: var(--accent); color: white; box-shadow: 0 0 20px var(--accent-glow); }

        .cv-float {
            position: fixed; bottom: 30px; right: 30px;
            background: rgba(139, 92, 246, 0.9); color: white;
            border-radius: 50px; padding: 14px 28px; z-index: 2000;
            font-weight: 700; text-decoration: none; backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* --- CARDS --- */
        .project-card {
            background: rgba(15, 15, 30, 0.7); border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 2.5rem; transition: 0.4s; backdrop-filter: blur(10px);
        }
        .project-card:hover { border-color: var(--accent); transform: translateY(-10px); }

        .typed-text { color: var(--accent); font-weight: 700; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark fixed-top">
    <div class="container">
        <span class="navbar-brand fw-bold">IGNACIO EGOZCUE</span>
        <div class="d-flex gap-3">
             <a href="https://linkedin.com/in/idet-uy" target="_blank" class="text-white opacity-75"><i class="fab fa-linkedin"></i></a>
             <a href="https://github.com/Nacho20dev" target="_blank" class="text-white opacity-75"><i class="fab fa-github"></i></a>
        </div>
    </div>
</nav>

<a href="Cv.IgnacioEgozcueTech.pdf" download class="cv-float">
    <i class="fa-solid fa-cloud-arrow-down me-2"></i>Descargar CV
</a>

<header class="hero-wrapper">
    <div class="stars-overlay"></div>
    <div class="hero-content container">
        <h1 class="main-title">Ignacio Egozcue</h1>
        <div class="fs-4 text-secondary mb-4">
            Soy <span class="typed-text"></span><span class="cursor">|</span>
        </div>
        <div class="mt-5 pt-3">
            <a href="#proyectos" class="btn-hero">Explorar Proyectos</a>
        </div>
    </div>
</header>

<section class="orbit-section container">
    <h2 class="text-center mb-5">Stack Tecnológico</h2>
    <p class="text-center text-secondary small mb-5">Desliza para girar la órbita</p>
    
    <div class="orbit-container" id="orbitContainer">
        <div class="orbit-center">
            <i class="fa-solid fa-code"></i>
        </div>
        
        <div class="orbit-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/csharp/csharp-original.svg" title="C#"></div>
        <div class="orbit-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg" title="Java"></div>
        <div class="orbit-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" title="JS"></div>
        <div class="orbit-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg" title="React"></div>
        <div class="orbit-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/ionic/ionic-original.svg" title="Ionic"></div>
        <div class="orbit-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/redux/redux-original.svg" title="Redux"></div>
        <div class="orbit-item"><img src="https://www.svgrepo.com/show/303229/microsoft-sql-server-logo.svg" title="SQL"></div>
        <div class="orbit-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/dotnetcore/dotnetcore-original.svg" title=".NET"></div>
    </div>
</section>

<script>
    // --- Lógica de la Órbita ---
    const container = document.getElementById('orbitContainer');
    const items = document.querySelectorAll('.orbit-item');
    let angle = 0;
    let isDragging = false;
    let startX = 0;
    let velocity = 0.02; // Velocidad de rotación automática inicial

    const radius = 150; // Radio de la órbita

    function updateOrbit() {
        if (!isDragging) angle += velocity;

        items.forEach((item, index) => {
            const itemAngle = angle + (index * (Math.PI * 2 / items.length));
            const x = Math.cos(itemAngle) * radius;
            const z = Math.sin(itemAngle) * radius;
            
            // Efecto de escala y opacidad para dar profundidad 3D
            const scale = (z + radius) / (2 * radius) * 0.5 + 0.5;
            const opacity = (z + radius) / (2 * radius) * 0.7 + 0.3;
            
            item.style.transform = `translate(${x}px, ${z*0.3}px) scale(${scale})`;
            item.style.opacity = opacity;
            item.style.zIndex = Math.round(z + radius);
        });

        requestAnimationFrame(updateOrbit);
    }

    // Eventos de Mouse/Touch
    container.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.clientX;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const deltaX = e.clientX - startX;
        angle += deltaX * 0.005;
        startX = e.clientX;
        velocity = deltaX * 0.005; // Guardamos la velocidad para la inercia
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
    });

    // Soporte para Mobile
    container.addEventListener('touchstart', (e) => {
        isDragging = true;
        startX = e.touches[0].clientX;
    });

    window.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const deltaX = e.touches[0].clientX - startX;
        angle += deltaX * 0.01;
        startX = e.touches[0].clientX;
        velocity = deltaX * 0.01;
    });

    window.addEventListener('touchend', () => { isDragging = false; });

    updateOrbit();

    // --- Typed Text logic ---
    const typedTextSpan = document.querySelector(".typed-text");
    const textArray = ["Backend Developer", "Analista Programador", "Mobile Tech Enthusiast"];
    let textArrayIndex = 0, charIndex = 0;

    function type() {
        if (charIndex < textArray[textArrayIndex].length) {
            typedTextSpan.textContent += textArray[textArrayIndex].charAt(charIndex);
            charIndex++; setTimeout(type, 100);
        } else { setTimeout(erase, 2000); }
    }
    function erase() {
        if (charIndex > 0) {
            typedTextSpan.textContent = textArray[textArrayIndex].substring(0, charIndex - 1);
            charIndex--; setTimeout(erase, 50);
        } else {
            textArrayIndex = (textArrayIndex + 1) % textArray.length;
            setTimeout(type, 1000);
        }
    }
    document.addEventListener("DOMContentLoaded", () => setTimeout(type, 1000));
</script>

</body>
</html>
