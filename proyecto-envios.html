<div id="app-container" class="logivip-wrapper">
    
    <section id="view-login" class="app-view">
        <div class="login-box animate__animated animate__zoomIn">
            <div class="text-center mb-4">
                <i class="fa-solid fa-boxes-packing text-info fs-1"></i>
                <h2 class="text-white fw-black">LOGI<span class="opacity-50">VIP</span></h2>
            </div>
            <form id="fake-login-form">
                <input type="text" class="form-control mb-3" placeholder="Usuario Operador">
                <input type="password" class="form-control mb-4" placeholder="Password">
                <button type="button" onclick="showView('view-dashboard')" class="btn btn-warning w-100 fw-bold">
                    INICIAR SESIÓN
                </button>
            </form>
        </div>
    </section>

    <section id="view-dashboard" class="app-view d-none">
        <nav class="navbar-vip py-3 px-4 d-flex justify-content-between align-items-center">
            <span class="fw-black text-white"><i class="fa-solid fa-satellite text-info me-2"></i>LOGIVIP HUB</span>
            <button onclick="showView('view-login')" class="btn btn-outline-info btn-sm rounded-pill">LOGOUT</button>
        </nav>

        <div class="container py-5">
            <h3 class="text-white fw-black mb-4">ESTADO DE OPERACIONES</h3>
            <div class="card bg-black bg-opacity-40 border-info border-opacity-10 p-4 rounded-4">
                <div class="row align-items-center">
                    <div class="col-md-4">
                        <span class="x-small text-info opacity-50">TRACKING</span>
                        <h5 class="text-white mb-0">#MVD-9928-VIP</h5>
                    </div>
                    <div class="col-md-4">
                        <span class="badge bg-info text-dark rounded-pill">EN TRÁNSITO</span>
                    </div>
                    <div class="col-md-4 text-end">
                        <button class="btn btn-sm btn-outline-info">DETALLES</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

</div>

<style>
    /* INTEGRAMOS EL MOTOR BLUE VIP AQUÍ */
    .logivip-wrapper {
        background: radial-gradient(circle at center, #0a0c12 0%, #050505 100%);
        min-height: 800px; /* Tamaño tipo ventana de App */
        position: relative;
        overflow: hidden;
        border-radius: 20px;
        border: 1px solid rgba(0, 210, 255, 0.2);
    }
    
    .app-view {
        transition: all 0.5s ease;
        min-height: 800px;
    }

    .d-none { display: none; }
    /* (Copiá aquí el resto de los estilos Blue VIP que ya tenemos) */
</style>

<script>
    // Lógica simple para cambiar de "cara" sin recargar la página
    function showView(viewId) {
        document.querySelectorAll('.app-view').forEach(v => v.classList.add('d-none'));
        const nextView = document.getElementById(viewId);
        nextView.classList.remove('d-none');
        nextView.classList.add('animate__animated', 'animate__fadeIn');
    }
</script>
